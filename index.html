<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);min-height:100vh;padding:20px}
.container{max-width:700px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
.home-page{text-align:center;display:block}
.home-page h1{font-size:32px;color:#ff5e7d;margin-bottom:15px}
.slogan{font-size:18px;color:#666;margin-bottom:40px;line-height:1.6}
.start-btn{background:#ff5e7d;color:#fff;border:none;padding:15px 40px;font-size:20px;border-radius:50px;cursor:pointer}
.test-page{display:none}
.question-title{font-size:22px;margin-bottom:25px;font-weight:bold}
.options{display:flex;flex-direction:column;gap:15px}
.option{background:#f8f9fa;border:2px solid #eee;padding:15px;border-radius:12px;cursor:pointer}
.option.selected{background:#ff5e7d;color:#fff}
.progress{margin-top:20px;text-align:center;color:#666}
.result-page{display:none;text-align:center}
.result-title{font-size:28px;color:#ff5e7d;margin-bottom:15px}
.match-rate{font-size:20px;color:#666;margin-bottom:20px}
.result-desc{background:#fdf3f5;padding:20px;border-radius:12px;text-align:left;margin:20px 0;line-height:1.8}
.score-title{font-size:20px;margin:30px 0 20px;font-weight:bold}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:30px}
.score-item{background:#f8f9fa;padding:12px;border-radius:8px}
.bar{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-top:5px}
.fill{height:100%;background:#ff5e7d}
.author-words{background:#fff9e6;padding:20px;border-radius:12px;text-align:left;line-height:1.8;margin:30px 0;color:#856404}
.restart-btn{background:#6c757d;color:#fff;border:none;padding:12px 30px;border-radius:50px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="home-page" id="home">
    <h1>人格测试</h1>
    <p class="slogan">全网最“”的人格鉴定<br>测完你会发现：原来我什么也没发现！</p>
    <button class="start-btn" onclick="startTest()">开始测试</button>
  </div>

  <div class="test-page" id="test">
    <div class="question-title" id="question"></div>
    <div class="options" id="options"></div>
    <div class="progress" id="progress"></div>
  </div>

  <div class="result-page" id="result">
    <div class="result-title" id="personality"></div>
    <div class="match-rate" id="match"></div>
    <div class="result-desc" id="desc"></div>
    <div class="score-title">📊 十五维度人格评分</div>
    <div class="score-grid" id="scoreBoard"></div>
    <div class="author-words">
      <strong>💌 作者的话：</strong><br>
      本测试纯属娱乐！<br>
      觉得好玩就分享给朋友
    </div>
    <button class="restart-btn" onclick="restart()">重新测试</button>
  </div>
</div>

<audio id="bgm"></audio>

<script>
const questions = [
  {q:"1. 朋友约你出门，你第一反应是？",o:[
    {text:"马上答应，随叫随到",score:[5,0,3,0,2]},
    {text:"先躺会儿，磨蹭再出门",score:[0,5,0,2,3]},
    {text:"出门个蛋，我要打游戏",score:[0,0,5,3,0]},
    {text:"问清干嘛再决定",score:[2,3,0,5,0]}
  ]},
  {q:"2. 上课迟到了，你会？",o:[
    {text:"坦然走进教室",score:[0,0,0,5,5]},
    {text:"偷偷溜进去",score:[0,3,2,0,0]},
    {text:"管他呢，旷了",score:[5,0,0,0,3]},
    {text:"疯狂道歉",score:[0,2,5,0,0]}
  ]},
  {q:"3. 看到搞笑视频，你会？",o:[
    {text:"哈哈大笑分享所有人",score:[5,5,0,0,0]},
    {text:"默默收藏自己乐",score:[0,0,5,0,2]},
    {text:"面无表情划走",score:[0,0,0,5,0]},
    {text:"吐槽太尬",score:[0,0,0,0,5]}
  ]},
  {q:"4. 点外卖纠结半天，你会？",o:[
    {text:"破罐子破摔，点个最贵的",score:[5,0,0,3,0]},
    {text:"投个骰子",score:[0,2,0,5,0]},
    {text:"点常吃的",score:[0,0,5,0,3]},
    {text:"不吃了",score:[0,5,2,0,0]}
  ]},
  {q:"5. 别人夸你好看，你会？",o:[
    {text:"谢谢，你眼光真好",score:[5,0,0,2,0]},
    {text:"害羞摆手",score:[0,5,0,0,2]},
    {text:"那必须，我超美",score:[0,0,0,0,5]},
    {text:"不处",score:[0,0,5,0,0]}
  ]},
  {q:"6. 周末你最想做的事是？",o:[
    {text:"出门逛街",score:[5,0,0,0,2]},
    {text:"睡觉，睡觉，还是睡觉",score:[0,5,5,0,0]},
    {text:"学习卷死别人",score:[0,0,0,5,3]},
    {text:"开亿把",score:[3,0,0,0,5]}
  ]},
  {q:"7. cs还是valorant",o:[
    {text:"cs",score:[0,5,0,0,0]},
    {text:"valorant",score:[5,0,0,3,2]},
    {text:"不如王者荣耀世界",score:[0,0,5,0,3]},
    {text:"不如原神",score:[0,0,0,5,5]}
  ]},
  {q:"8. 你更喜欢的社交方式是？",o:[
    {text:"线上聊天",score:[5,0,0,2,3]},
    {text:"线下见面",score:[0,5,2,5,0]},
    {text:"不社交",score:[0,0,5,0,0]},
    {text:"小圈子聚会",score:[2,3,0,0,5]}
  ]},
  {q:"9. 花钱的时候你通常是？",o:[
    {text:"大手大脚",score:[5,0,0,0,5]},
    {text:"精打细算",score:[0,0,5,5,0]},
    {text:"冲动消费",score:[0,5,0,0,3]},
    {text:"理性消费",score:[0,0,0,5,2]}
  ]},
  {q:"10. 别人找你帮忙，你会？",o:[
    {text:"毫不犹豫答应",score:[0,5,5,0,0]},
    {text:"看情况再帮",score:[2,0,0,5,3]},
    {text:"直接拒绝",score:[5,0,0,0,0]},
    {text:"先答应再后悔",score:[0,3,2,0,5]}
  ]},
  {q:"11. 你发脾气的频率是？",o:[
    {text:"一点就炸",score:[5,0,0,0,0]},
    {text:"很少生气",score:[0,5,0,3,2]},
    {text:"默默生气",score:[0,0,5,0,3]},
    {text:"冷静沟通",score:[0,0,0,5,0]}
  ]},
  {q:"12. 对于未来，你是？",o:[
    {text:"充满期待",score:[5,0,0,5,0]},
    {text:"走一步看一步",score:[0,5,3,0,2]},
    {text:"焦虑不安",score:[0,0,5,0,0]},
    {text:"摆烂躺平",score:[0,0,0,0,5]}
  ]},
  {q:"13. 在人群中你是？",o:[
    {text:"显眼包焦点",score:[5,0,0,0,5]},
    {text:"安静小透明",score:[0,0,5,0,0]},
    {text:"气氛组担当",score:[0,5,0,5,0]},
    {text:"默默观察者",score:[0,0,0,5,2]}
  ]},
  {q:"14. 你做事的风格是？",o:[
    {text:"说干就干",score:[5,0,0,5,0]},
    {text:"拖延到最后",score:[0,5,0,0,5]},
    {text:"仔细规划",score:[0,0,5,5,0]},
    {text:"随心所欲",score:[0,0,0,0,5]}
  ]},
  {q:"15. 你觉得自己？",o:[
    {text:"不一定是人类",score:[5,0,0,2,3]},
    {text:"伪人",score:[0,0,5,0,5]},
    {text:"人类。？",score:[0,5,2,3,0]},
    {text:"像个人类",score:[0,0,0,5,0]}
  ]}
];

const dimensionNames = [
  "外向值","随和值","宅家值","理智值","搞怪值",
  "社死值","摆烂值","社牛值","消费观","老好人值",
  "暴脾气","乐观值","显眼包","执行力","佛系值"
];

// ==============================
// 每个结果 → 独立图片 + 独立音乐
// ==============================
const personalities = [
  {
    name:"dank2ng",
    match:"99%",
    img:"https://s41.ax1x.com/2026/04/11/pewODwd.webp",
    music:"https://image2url.com/r2/default/audio/1775882133156-158d21e8-4ab3-45a5-8080-4a6573c61ed8.mp3",
    desc:"我要打上海major~全场欢呼 dank1ng！dank1ng！"
  },
  {
    name:"zykkkk",
    match:"95%",
    img:"https://s41.ax1x.com/2026/04/11/pewLnDH.jpg",
    music:"https://image2url.com/r2/default/audio/1775883604902-435ea834-ea1a-4241-b9f4-cb8c3030f0b9.mp3",
    desc:"kskbl,zdjd?"
  },
  {
    name:"cxy",
    match:"92%",
    img:"https://s41.ax1x.com/2026/04/11/pewLyxU.jpg",
    music:"https://image2url.com/r2/default/audio/1775884983356-cdaf015e-ecb7-4b6c-9290-67d507386f05.mp3",
    desc:"感谢真比以前瘦了开通的初爱守护， 感谢老板。"
  },
  {
    name:"hang",
    match:"90%",
    img:"https://s41.ax1x.com/2026/04/11/pewOrTA.jpg",
    music:"https://image2url.com/r2/default/audio/1775885711239-20813fcc-db12-44cf-b754-038bb69204d4.mp3",
    desc:"高手不赢。"
  },
  {
    name:"dooonk",
    match:"97%",
    img:"https://s41.ax1x.com/2026/04/11/pewdLfU.webp",
    music:"https://music.163.com/song/media/outer/url?id=1831899575.mp3",
    desc:"I just fxxking destroy them"
  }
];

let currentQuestion = 0;
let scores = new Array(15).fill(0);
let audio = document.getElementById("bgm");

function startTest(){
  document.getElementById("home").style.display="none";
  document.getElementById("test").style.display="block";
  renderQuestion();
}

function renderQuestion(){
  const q = questions[currentQuestion];
  document.getElementById("question").innerText = q.q;
  const opt = document.getElementById("options");
  opt.innerHTML = "";
  q.o.forEach((o,i)=>{
    let d = document.createElement("div");
    d.className="option";
    d.innerText=o.text;
    d.onclick=()=>select(i);
    opt.appendChild(d);
  });
  document.getElementById("progress").innerText = `第 ${currentQuestion+1}/15 题`;
}

function select(i){
  document.querySelectorAll(".option").forEach(e=>e.classList.remove("selected"));
  document.querySelectorAll(".option")[i].classList.add("selected");
  let s = questions[currentQuestion].o[i].score;
  for(let j=0;j<5;j++){
    let idx = Math.floor(currentQuestion/3)*5 + j;
    if(idx < 15) scores[idx] += s[j];
  }
  setTimeout(()=>{
    currentQuestion++;
    if(currentQuestion<15) renderQuestion();
    else showResult();
  },300);
}

function showResult(){
  document.getElementById("test").style.display="none";
  document.getElementById("result").style.display="block";
  let total = scores.reduce((a,b)=>a+b,0);
  let p = personalities[total%5];
  
  document.getElementById("personality").innerText = p.name;
  document.getElementById("match").innerText = `匹配度：${p.match}`;
  
  document.getElementById("desc").innerHTML = `
    <img src="${p.img}" style="width:90%;max-width:320px;border-radius:16px;margin:10px auto;display:block;">
    <br>${p.desc}
  `;

  // 🎵 播放当前结果专属音乐
  audio.src = p.music;
  audio.currentTime = 0;
  audio.play().catch(err=>{});

  let board = document.getElementById("scoreBoard");
  board.innerHTML = "";
  scores.forEach((sc,i)=>{
    let v = Math.min(100, Math.max(0, sc*5));
    board.innerHTML += `
    <div class="score-item">
      <div>${dimensionNames[i]}</div>
      <div class="bar"><div class="fill" style="width:${v}%"></div></div>
      <div>${v}分</div>
    </div>`;
  });
}

function restart(){
  currentQuestion=0;
  scores=new Array(15).fill(0);
  audio.pause();
  document.getElementById("result").style.display="none";
  document.getElementById("home").style.display="block";
}
</script>
</body>
</html>
